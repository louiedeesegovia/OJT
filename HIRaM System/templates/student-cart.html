<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart — CReATe CSU</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='student-dashboard.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/CSU-logo.png') }}">
  <style>
    /* ── CART PAGE EXTRAS ── */
    .cart-page-wrap {
      max-width: 860px;
      margin: 2.5rem auto;
      padding: 0 2rem;
    }

    .cart-page-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .cart-page-header-icon {
      width: 52px; height: 52px;
      background: var(--accent-light);
      border: 1.5px solid #c8e6d6;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }

    .cart-page-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 0;
      color: var(--text);
    }

    .cart-page-header p {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 2px 0 0;
    }

    .cart-empty-box {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      text-align: center;
      padding: 5rem 2rem;
      box-shadow: var(--shadow);
    }

    .cart-empty-box .e-icon { font-size: 3rem; margin-bottom: 1rem; }
    .cart-empty-box h3 { font-size: 1rem; color: var(--text); margin-bottom: 6px; font-weight: 700; }
    .cart-empty-box p { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.5rem; }

    .cart-table-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .cart-table {
      width: 100%;
      border-collapse: collapse;
    }

    .cart-table thead tr { background: var(--bg); }

    .cart-table th {
      padding: 12px 16px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-align: left;
      border-bottom: 1.5px solid var(--border);
    }

    .cart-table td {
      padding: 14px 16px;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .cart-table tbody tr:last-child td { border-bottom: none; }
    .cart-table tbody tr:hover { background: var(--bg); }

    .cart-item-name {
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--text);
    }

    .cart-item-cat {
      font-size: 0.67rem;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 3px 9px;
      border-radius: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      display: inline-block;
      margin-top: 4px;
    }

    .c-avail-badge {
      font-size: 0.71rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .c-avail-badge.yes { background: #e8f8f2; color: #1a9e6e; }
    .c-avail-badge.no  { background: #fdeaea; color: #e05454; }
    .c-avail-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .c-avail-badge.yes::before { background: #1a9e6e; }
    .c-avail-badge.no::before  { background: #e05454; }

    .c-borrow-btn {
      font-family: 'Sora', sans-serif;
      font-size: 0.73rem;
      font-weight: 600;
      padding: 7px 13px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s;
    }
    .c-borrow-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(2,50,29,0.25);
    }
    .c-borrow-btn.off {
      background: var(--tag-bg);
      color: var(--muted);
      pointer-events: none;
      cursor: default;
    }

    .c-remove-btn {
      font-family: 'Sora', sans-serif;
      font-size: 0.71rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1.5px solid #fbd5d5;
      background: #fdeaea;
      color: #e05454;
      cursor: pointer;
      transition: all 0.15s;
    }
    .c-remove-btn:hover {
      background: #e05454;
      color: #fff;
      border-color: #e05454;
    }

    .cart-footer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.4rem;
      gap: 12px;
      flex-wrap: wrap;
    }

    .cart-count-label {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .cart-count-label strong { color: var(--text); font-weight: 700; }

    .c-back-btn {
      font-family: 'Sora', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s;
    }
    .c-back-btn:hover { background: var(--bg); }

    .c-clear-btn {
      font-family: 'Sora', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 9px;
      border: 1.5px solid #fbd5d5;
      background: #fdeaea;
      color: #e05454;
      cursor: pointer;
      transition: all 0.15s;
    }
    .c-clear-btn:hover { background: #e05454; color: #fff; border-color: #e05454; }

    /* ── BORROW ALL BUTTON ── */
    .c-borrow-all-btn {
      font-family: 'Sora', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 9px 20px;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .c-borrow-all-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(2,50,29,0.3);
    }

    @media (max-width: 600px) {
      .cart-page-wrap { padding: 0 1.2rem; }
      .cart-table th:nth-child(2),
      .cart-table td:nth-child(2) { display: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <img src="{{ url_for('static', filename='img/CSU-logo.png') }}" alt="CSU Logo" class="nav-logo-img" onerror="this.style.display='none'">
    <div class="nav-title">
      Center for Resource Assessment, Analytics and Emerging Technologies
      <small>Caraga State University</small>
    </div>
  </div>
  <div class="nav-user">
    <span style="font-size:0.78rem">Hello, {{ student.name }}</span>
    <a href="{{ url_for('student_cart') }}" class="nav-cart-link" title="My Cart">
      <div class="nav-cart">
        <button class="nav-btn nav-btn-cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          My Cart
        </button>
      </div>
    </a>
    <a href="{{ url_for('student_logout') }}">
      <button class="nav-btn nav-btn-logout">Logout</button>
    </a>
    <div class="nav-avatar">S</div>
  </div>
</nav>

<!-- CART PAGE BODY -->
<div class="cart-page-wrap">

  <div class="cart-page-header">
    <div class="cart-page-header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.5 6h13M7 13L5.4 5M10 21a1 1 0 100-2 1 1 0 000 2zm7 0a1 1 0 100-2 1 1 0 000 2z"/>
      </svg>
    </div>
    <div>
      <h1>My Cart</h1>
      <p>Items saved for future borrowing</p>
    </div>
  </div>

  <div id="cartContent"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastIcon">✓</span>
  <span id="toastMsg"></span>
</div>

<script>
  function getCart() {
    try { return JSON.parse(localStorage.getItem('csu_cart') || '[]'); } catch { return []; }
  }

  function saveCart(cart) {
    localStorage.setItem('csu_cart', JSON.stringify(cart));
    renderCart();
  }

  function removeFromCart(id) {
    saveCart(getCart().filter(i => i.id !== id));
    showToast('🗑️', 'Item removed from cart');
  }

  // Borrow a single item: remove it from cart, then go to borrow page
  function borrowItem(id) {
    saveCart(getCart().filter(i => i.id !== id));
    window.location.href = '/student/borrow?inventory_id=' + id;
  }

  // Borrow all available items: clear entire cart, go to borrow page of first available
function borrowAll() {
    const cart = getCart();
    if (cart.length === 0) {
        showToast('⚠️', 'Your cart is empty');
        return;
    }
    const params = cart.map(i => 'inventory_ids=' + i.id).join('&');
    window.location.href = '/student/borrow/bulk?' + params;
}

  function clearCart() {
    saveCart([]);
    showToast('🗑️', 'Cart cleared');
  }

  function showToast(icon, msg) {
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastMsg').textContent = msg;
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function renderCart() {
    const cart = getCart();
    const wrap = document.getElementById('cartContent');

    if (cart.length === 0) {
      wrap.innerHTML =
        '<div class="cart-empty-box">' +
          '<div class="e-icon">🛒</div>' +
          '<h3>Your cart is empty</h3>' +
          '<p>Browse the inventory and click the cart icon on any item to save it here.</p>' +
          '<a href="{{ url_for("student_dashboard") }}" class="c-back-btn">← Browse Inventory</a>' +
        '</div>';
      return;
    }

    const availableCount = cart.filter(i => i.available).length;

    let rows = '';
    cart.forEach(function(item) {
      const actionBtn = '<button class="c-borrow-btn" onclick="borrowItem(' + item.id + ')">📦 Borrow Now</button>'

      rows +=
        '<tr>' +
          '<td>' +
            '<div class="cart-item-name">' + esc(item.name) + '</div>' +
            '<span class="cart-item-cat">' + esc(item.category || '') + '</span>' +
          '</td>' +
          '<td>' +
            '<span class="c-avail-badge ' + (item.available ? 'yes' : 'no') + '">' +
              (item.available ? 'Available' : 'Unavailable Today') +
            '</span>' +
          '</td>' +
          '<td>' + actionBtn + '</td>' +
          '<td><button class="c-remove-btn" onclick="removeFromCart(' + item.id + ')">Remove</button></td>' +
        '</tr>';
    });

    const availLabel = availableCount > 0
      ? ' &nbsp;·&nbsp; <span style="color:var(--success);font-weight:600;">' + availableCount + ' available</span>'
      : '';

    const borrowAllBtn = cart.length > 0
    ? '<button class="c-borrow-all-btn" onclick="borrowAll()">📦 Borrow All (' + cart.length + ')</button>'
    : '';

    wrap.innerHTML =
      '<div class="cart-table-wrap">' +
        '<table class="cart-table">' +
          '<thead><tr>' +
            '<th>Item</th><th>Status</th><th>Action</th><th></th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
      '<div class="cart-footer-bar">' +
        '<span class="cart-count-label">' +
          '<strong>' + cart.length + '</strong> item' + (cart.length !== 1 ? 's' : '') + ' in cart' + availLabel +
        '</span>' +
        '<div style="display:flex;gap:8px;align-items:center;">' +
          '<a href="{{ url_for("student_dashboard") }}" class="c-back-btn">← Back to Inventory</a>' +
          '<button class="c-clear-btn" onclick="clearCart()">Clear Cart</button>' +
          borrowAllBtn +
        '</div>' +
      '</div>';
  }

  renderCart();
</script>

</body>
</html>
